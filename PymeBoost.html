<style>
  :root{
    /* paper / ink */
    --paper:#FAF5EC;
    --paper-2:#F3ECDD;
    --surface:#FFFFFF;
    --ink:#211B12;
    --ink-soft:#6B6253;
    --ink-faint:#9C9384;
    --line:#211B12;

    /* semantic tokens (from Retro design system) */
    --primary:#3B82F6;
    --primary-deep:#1E5FD6;
    --secondary:#8B5CF6;
    --secondary-deep:#6D3FE0;
    --success:#16A34A;
    --warning:#D97706;
    --danger:#DC2626;

    --accent:var(--primary);      /* tweakable */
    --accent-deep:var(--primary-deep);

    /* spacing 4/8/12/16/24/32 */
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s6:24px; --s8:32px;

    --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:22px;

    --font-display:'Macondo', cursive;   /* tweakable: fuente de marca */

    /* retro intensity (default: sutil) */
    --bd:1.5px;
    --sh:0 3px 0 rgba(33,27,18,.16), 0 1px 0 rgba(33,27,18,.10);
    --sh-pop:2px 3px 0 rgba(33,27,18,.85);
    --sh-card:3px 4px 0 rgba(33,27,18,.14), 0 1px 0 rgba(33,27,18,.20);
  }
  html[data-retro="balanced"]{
    --bd:2px;
    --sh:3px 3px 0 rgba(33,27,18,.85);
    --sh-pop:3px 4px 0 rgba(33,27,18,.95);
    --sh-card:4px 5px 0 rgba(33,27,18,.20), 0 1px 0 rgba(33,27,18,.30);
  }
  html[data-retro="expressive"]{
    --bd:2.5px;
    --sh:5px 5px 0 var(--ink);
    --sh-pop:5px 6px 0 var(--ink);
    --sh-card:6px 7px 0 rgba(33,27,18,.92);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Space Grotesk', system-ui, sans-serif;
    font-size:15px; line-height:1.45;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(rgba(33,27,18,.05) 1px, transparent 1.4px);
    background-size:22px 22px;
  }
  #root{ height:100%; }

  .mono{ font-family:'JetBrains Mono', monospace; }
  .display{ font-family:var(--font-display); font-weight:400; }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    text-transform:uppercase; letter-spacing:.14em;
    font-size:11px; font-weight:600; color:var(--ink-soft);
  }
  h1,h2,h3,h4{ margin:0; font-weight:600; letter-spacing:-.01em; }

  button{ font-family:inherit; cursor:pointer; }
  ::selection{ background:var(--accent); color:#fff; }

  /* scrollbars */
  *::-webkit-scrollbar{ width:10px; height:10px; }
  *::-webkit-scrollbar-thumb{ background:var(--paper-2); border:2px solid var(--paper); border-radius:20px; }
  *::-webkit-scrollbar-thumb:hover{ background:#e2d8c4; }

  @keyframes popIn{ from{ transform:translateY(10px) scale(.97);} to{ transform:none;} }
  @keyframes toastIn{ from{ transform:translate(-50%,14px);} to{ transform:translate(-50%,0);} }
  @keyframes fadeIn{ from{ opacity:.4;} to{ opacity:1;} }
  @keyframes stampIn{ from{ opacity:0; transform:rotate(var(--rot,-12deg)) scale(1.5);} to{ opacity:1; transform:rotate(var(--rot,-12deg)) scale(1);} }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; } }
</style>
